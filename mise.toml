[tools]
python = "3.13.12"

[tasks.check]
description = "Validate the complete skills catalog and vendored hashes."
run = "python3 scripts/install-skills.py --check && python3 -m unittest discover -s tests -v"

[tasks.install]
description = "Install every vendored and pinned upstream skill."
run = "python3 scripts/install-skills.py \"$@\""

[tasks.verify]
description = "Verify ~/.agents/skills against the desired catalog."
run = "python3 scripts/install-skills.py --verify \"$@\""
