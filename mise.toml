[tools]
python = "3.13.12"

[tasks.check]
description = "Validate the skills manifest."
run = "python3 scripts/install-skills.py --check"

[tasks.install]
description = "Install selected skills into ~/.agents/skills."
run = "python3 scripts/install-skills.py \"$@\""

[tasks.dry-run]
description = "Preview core and Apple skill installation."
run = "python3 scripts/install-skills.py --profile core,apple --dry-run"
